dataset:
  path: data/emails.csv
  text_column: email_text
  label_column: label
  positive_labels: ["phishing", "spam", 1, "1", true, "true"]

preprocessing:
  lowercase: true
  strip_whitespace: true

features:
  tfidf_max_features: 5000
  tfidf_ngram_range: [1, 2]
  suspicious_keywords:
    - urgent
    - verify
    - password
    - account
    - click
    - login
    - bank
    - update
    - suspend
    - confirm

training:
  test_size: 0.2
  random_state: 42
