dataset:
  path: data/Phishing_Email.csv
  text_column: "Email Text"
  label_column: "Email Type"
  positive_labels: ["Phishing Email", "phishing", "spam", 1, "1", true, "true"]

preprocessing:
  lowercase: true
  strip_whitespace: true


training:
  test_size: 0.2
  random_state: 42

transformer:
  model_name: "distilbert-base-uncased"
  max_length: 512
  batch_size: 16
  epochs: 3
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  output_dir: "models/distilbert"
